<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Job {{ job_id }} · LCDL Transcripts</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <header class="topbar">
    <span class="brand"><a href="/">LCDL Legacy Transcripts</a></span>
    <a href="/logout" class="muted">Sign out</a>
  </header>

  <main class="card">
    <h1>Processing: {{ params.collection_title }}</h1>
    <div class="status-line">
      <span id="spinner" class="spinner"></span>
      <span id="status" class="status">Starting…</span>
    </div>

    <div id="actions" hidden>
      <a id="download" class="primary button" href="/jobs/{{ job_id }}/download">Download results (.zip)</a>
      <a href="/" class="ghost button">Start another job</a>
    </div>

    <h2>Progress</h2>
    <pre id="log" class="log" aria-live="polite"></pre>
  </main>

  <script>window.JOB_ID = "{{ job_id }}";</script>
  <script src="/static/job.js"></script>
</body>
</html>
